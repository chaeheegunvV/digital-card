<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>디지털 명함</title>
    <!-- Lucide Icons for aesthetic touch -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 은은한 그라데이션 다크 배경 */
            background: radial-gradient(circle at top left, #1e293b, #0f172a);
            overflow: hidden;
            color: #ffffff;
        }

        /* 배경 장식 요소 (유리 효과를 돋보이게 함) */
        .bg-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            filter: blur(80px);
            border-radius: 50%;
            z-index: -1;
            opacity: 0.4;
            animation: float 10s infinite alternate;
        }

        .bg-blob-2 {
            bottom: 10%;
            right: 15%;
            background: linear-gradient(135deg, #3b82f6, #2dd4bf);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* 메인 카드 (글래스모즘) */
        .card {
            position: relative;
            width: 380px;
            padding: 40px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
            cursor: default;
        }

        /* 카드 호버 효과 */
        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.7);
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* 프로필 이미지 자리 */
        .profile-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 24px;
            border-radius: 50%;
            background: linear-gradient(45deg, #6366f1, #a855f7);
            padding: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .profile-image {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background-color: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .profile-image i {
            color: #94a3b8;
        }

        /* 텍스트 스타일 */
        .name {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        /* 연락처 정보 */
        .info-item {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            text-decoration: none;
            color: #e2e8f0;
            transition: background 0.2s ease;
        }

        .info-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .info-item i {
            width: 18px;
            height: 18px;
            color: #818cf8;
        }

        .email-text {
            font-size: 0.95rem;
            font-weight: 500;
        }

        /* 복사 성공 메시지 박스용 */
        .copy-toast {
            position: fixed;
            bottom: 30px;
            background: rgba(99, 102, 241, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: none;
            animation: fadeInOut 2s ease forwards;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <!-- 배경 장식 -->
    <div class="bg-blob"></div>
    <div class="bg-blob bg-blob-2"></div>

    <!-- 디지털 명함 카드 -->
    <div class="card">
        <!-- 프로필 이미지 -->
        <div class="profile-container">
            <div class="profile-image">
                <!-- 실제 이미지가 있다면 <img src="..."> 로 대체 가능 -->
                <i data-lucide="user" size="60"></i>
            </div>
            <img src= profile.
        </div>

        <!-- 사용자 정보 -->
        <h1 class="name">채희건</h1>
        <p class="tagline">창의적인 가치를 디자인하는<br>프론트엔드 개발자입니다.</p>

        <!-- 연락처 -->
        <a href="mailto:your-email@example.com" class="info-item" onclick="copyEmail(event)">
            <i data-lucide="mail"></i>
            <span class="email-text">heegun4834@gamil.com</span>
        </a>
    </div>

    <!-- 알림 메시지 -->
    <div id="toast" class="copy-toast">이메일 주소가 복사되었습니다!</div>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 이메일 복사 기능
        function copyEmail(e) {
            e.preventDefault();
            const email = "your-email@example.com";
            
            // 임시 input 생성하여 복사
            const tempInput = document.createElement("input");
            tempInput.value = email;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);

            // 알림 표시
            const toast = document.getElementById("toast");
            toast.style.display = "block";
            setTimeout(() => {
                toast.style.display = "none";
            }, 2000);
        }
    </script>
</body>
</html>
